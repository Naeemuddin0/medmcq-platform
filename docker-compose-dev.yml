version: '3.8'

services:
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medmcq-web-dev
    ports:
      - "3001:3000"
    env_file:
      - .env.local
    # Injected by build-time if needed, but here we just rely on the env_file and Dockerfile defaults
    depends_on:
      - db-dev
    restart: unless-stopped

  db-dev:
    image: mongo:6
    container_name: medmcq-db-dev
    ports:
      - "27018:27017"
    volumes:
      - mongo-dev-data:/data/db
    restart: unless-stopped

volumes:
  mongo-dev-data:
